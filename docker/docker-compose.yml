version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: g24l-postgres
    environment:
      POSTGRES_DB: g24l_db
      POSTGRES_USER: g24l_user
      POSTGRES_PASSWORD: secure_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U g24l_user -d g24l_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: g24l-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://g24l_user:secure_password_change_me@postgres:5432/g24l_db
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
    command: npm run dev

  # NGINX Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: g24l-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: g24l-network
    driver: bridge
